name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  lint-and-migrate:
    name: Lint & Migrate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vertex_test_db
          POSTGRES_USER: vertex_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://vertex_user:test_password@localhost:5432/vertex_test_db
        run: pnpm db:migrate

      - name: Type check API
        run: cd apps/mobile-api && npx tsc --noEmit || true

      - name: Type check web portal
        run: cd apps/web-portal && npx tsc --noEmit || true
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Type check admin dashboard
        run: cd apps/admin-dashboard && npx tsc --noEmit || true
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
