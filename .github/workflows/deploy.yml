name: Deploy

on:
  push:
    branches: [main]

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Build web portal
        run: pnpm --filter web-portal build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build admin dashboard
        run: pnpm --filter admin-dashboard build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}
          NEXT_TELEMETRY_DISABLED: 1

      - name: Deploy
        run: |
          echo "✅ Build successful"
          echo "Configure deployment target in this step:"
          echo "  - Railway: railway deploy"
          echo "  - Vercel: vercel deploy --prod"
          echo "  - AWS: eb deploy"
