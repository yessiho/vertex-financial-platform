name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build all apps
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy API
        run: echo "Deploy step — configure with your cloud provider (Railway, Render, AWS, etc)"
        # Replace with your actual deploy command e.g.:
        # run: railway deploy --service mobile-api

      - name: Deploy Web Portal
        run: echo "Deploy web portal — configure with Vercel/Netlify"
        # run: vercel deploy apps/web-portal --prod --token ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Admin Dashboard
        run: echo "Deploy admin dashboard"
        # run: vercel deploy apps/admin-dashboard --prod --token ${{ secrets.VERCEL_TOKEN }}
